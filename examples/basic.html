<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atomic Motion Basic Example</title>
    <style>
      :root {
        --am-ease-standard-out: cubic-bezier(0.16, 1, 0.3, 1);
        --am-ease-expo-out: cubic-bezier(0.19, 1, 0.22, 1);
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: #08090d;
        color: #f7f7fb;
      }

      main {
        display: grid;
        gap: 40vh;
        padding: 20vh 8vw;
      }

      section {
        max-width: 760px;
      }

      h1,
      h2 {
        font-size: clamp(3rem, 9vw, 7rem);
        line-height: 0.9;
        letter-spacing: -0.08em;
        margin: 0;
      }

      p {
        color: #a6adbb;
        font-size: 1.2rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1 data-am="reveal-up" data-am-trigger="view" data-am-distance="48" data-am-duration="900" data-am-ease="expo-out">
          Atomic Motion
        </h1>
        <p data-am="fade" data-am-trigger="view" data-am-duration="700">
          Declarative, AI-friendly motion attributes with a small performance-safe runtime.
        </p>
      </section>

      <section>
        <h2 data-am="reveal-left" data-am-trigger="view" data-am-distance="40" data-am-duration="800">
          Scroll reveal
        </h2>
      </section>
    </main>

    <script type="module">
      import { initAtomicMotion } from '../src/index.js'

      const runtime = initAtomicMotion(document)
      window.atomicMotion = runtime
    </script>
  </body>
</html>
